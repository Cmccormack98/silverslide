<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SilverSlide — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { navy: '#1B3A5C', navyDeep: '#122743', amber: '#E07B39' } } }
    }
  </script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

  <header class="bg-navy text-white shadow-lg">
    <div class="max-w-md mx-auto px-6 py-5 flex items-center gap-4">
      <div class="w-1 h-10 bg-amber rounded-full flex-shrink-0"></div>
      <div>
        <h1 class="text-2xl font-bold tracking-tight">SilverSlide Agent</h1>
        <p class="text-slate-300 text-sm mt-0.5">Senior-friendly presentations</p>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 w-full max-w-sm">
      <h2 class="text-xl font-bold text-slate-800 mb-1">Welcome back</h2>
      <p class="text-slate-500 text-sm mb-6">Sign in to access SilverSlide</p>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Username</label>
          <input name="username" type="text" required autofocus
            class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-navy transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Password</label>
          <input name="password" type="password" required
            class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-navy transition" />
        </div>
        <button type="submit"
          class="w-full bg-navy hover:bg-navyDeep text-white font-semibold py-3 rounded-xl transition-colors duration-200 mt-2">
          Sign In
        </button>
      </form>
    </div>
  </main>

</body>
</html>
